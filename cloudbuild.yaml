steps:
  # Build the Docker image
  - name: 'gcr.io/cloud-builders/docker'
    args: ['build', '-t', 'gcr.io/$PROJECT_ID/q-genius:$COMMIT_SHA', '.']
  
  # Push the Docker image to Google Container Registry
  - name: 'gcr.io/cloud-builders/docker'
    args: ['push', 'gcr.io/$PROJECT_ID/q-genius:$COMMIT_SHA']
  
  # Deploy to Cloud Run
  - name: 'gcr.io/google.com/cloudsdktool/cloud-sdk'
    entrypoint: 'gcloud'
    args:
    - 'run'
    - 'deploy'
    - 'q-genius'
    - '--image=gcr.io/$PROJECT_ID/q-genius:$COMMIT_SHA'
    - '--region=us-central1'
    - '--platform=managed'
    - '--allow-unauthenticated'
    - '--port=3000'
    - '--memory=1Gi'
    - '--cpu=1'
    - '--timeout=600s'
    - '--concurrency=80'
    - '--max-instances=10'
    - '--min-instances=0'
    - '--set-env-vars=NODE_ENV=production'

images:
  - 'gcr.io/$PROJECT_ID/q-genius:$COMMIT_SHA'
